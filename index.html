<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="calculator">
        <input id="display" readonly>
        <div id="btns">
            <button onclick="appendDisplay('+')" class="opr">+</button>
            <button onclick="appendDisplay('1')">1</button>
            <button onclick="appendDisplay('2')">2</button>
            <button onclick="appendDisplay('3')">3</button>
            <button onclick="appendDisplay('-')" class="opr">-</button>
            <button onclick="appendDisplay('4')">4</button>
            <button onclick="appendDisplay('5')">5</button>
            <button onclick="appendDisplay('6')">6</button>
            <button onclick="appendDisplay('*')" class="opr">*</button>
            <button onclick="appendDisplay('7')">7</button>
            <button onclick="appendDisplay('8')">8</button>
            <button onclick="appendDisplay('9')">9</button>
            <button onclick="appendDisplay('/')" class="opr">/</button>
            <button onclick="appendDisplay('0')">0</button>
            <button onclick="appendDisplay('.')">.</button>
            <button onclick="Calculate()">=</button>
            <button onclick="Clearall()" class="opr">C</button>
            <button onclick="Del()">←</button>
            
        </div>
    </div>
    <div class="container">
        <div class="github">
        <div id="git">
        <a href="https://github.com/WhatTheHackkk" target="_blank">
            <b class="fa-brands fa-github">
                <pre>Click Here For Github</pre>
            </b>
        </div>
        <div id="lin">
        <a href="https://linkedin.com/in/roshvinroshan7" target="_blank">
            <b class="fa-brands fa-linkedin">
            <pre>Click Here For Linkedin</pre>
            </b>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
